[mode]
# 运行模式：false = curl_cffi 直连模式（推荐），true = RPC 模式（需启动 rpc-server）
is_rpc = false
[twitter]
cookie = ""

[rpc]
base_url = "http://127.0.0.1:5612"
# HTTP 层超时（秒），默认 60s，并发请求多时可适当增大
timeout = 90

[mongodb]
uri = "mongodb://localhost:27017"
database = "community_notes"
username = ""
password = ""

[storage]
# 是否将 Twitter 接口原始响应落库到 x_com_api_raw 集合（TweetDetail / GenericTimeline / BirdwatchFetchGlobalTimeline）
save_raw_response = false

[monitor]
note_crawl = 10  # 基础抓取间隔（秒）
metrics_update = 10  # 基础更新间隔（秒）

# new note 策略：每次更新成功后随机在 [2h, 4h] 范围内选择下次更新时间
# 随机化将大量 post 的到期时间在时间轴上自然摊开，避免集中争抢账号
new_min_seconds = 7200
new_max_seconds = 14400
new_max_days = 6                  # 未变成helpful时最多追踪6天

# new note 变成 helpful 后：随机在 [1h, 2h] 范围内选择下次更新时间
new_to_helpful_min_seconds = 3600
new_to_helpful_max_seconds = 7200
new_to_helpful_max_days = 14     # 变成helpful后追踪14天

# helpful note 策略：随机在 [2h, 4h] 范围内选择下次更新时间
helpful_min_seconds = 7200
helpful_max_seconds = 14400
helpful_max_days = 14             # 最多追踪14天
# 线程池配置（各任务独立，不互相争抢）
# crawl 数量: 列表抓取轻量，10 足够
# update_new 数量: 新帖更新密集，分配 30
# update_helpful 数量: helpful 更新量较少，20 足够
max_workers = 60
crawl_workers = 10
update_new_workers = 30
update_helpful_workers = 20
[proxy]
url = "http://127.0.0.1:7890"

[account]
# 冷却时间配置（秒）
cooldown_after_3_fails = 1800      # 连续失败 3 次后冷却 30 分钟
cooldown_after_5_fails = 7200      # 连续失败 5 次后冷却 2 小时
cooldown_after_10_fails = 86400    # 连续失败 10 次后冷却 24 小时

# 单账号最小请求间隔（秒），默认 0.5s = 120 req/min，远低于 Twitter 1500/15min 上限
per_account_min_interval = 3     # 单账号最小间隔（秒），0.3 req/s 约 270 req/15min，低于 Twitter 限流阈值

# 账号列表（可选，如果数据库为空则使用 twitter.cookie 作为 fallback）
# [[account.accounts]]
# username = "account1"
# cookie = "your_cookie_string"
# enabled = true

[health]
# 健康监控配置
enabled = true                    # 是否启用健康监控
report_interval = 300            # 健康看板输出间隔（秒），默认 5 分钟
persist_snapshots = true         # 是否将健康快照持久化到 MongoDB